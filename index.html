<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsight: Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Landing Page Overlay -->
    <div id="landingOverlay" class="overlay-full">
        <div class="overlay-content">
            <img src="ps.jpg.png" alt="Logo" class="main-logo">
            <h2>Welcome to Pulsight</h2>
            <p>Detection requires a stable 35cm distance and good lighting.</p>
            <div class="overlay-btns">
                <button id="proceedBtn" onclick="closeOverlay()">🚀 Proceed to System</button>
            </div>
        </div>
    </div>

    <div id="hamburger" onclick="toggleMenu()">☰</div>
    <nav id="sideNav" class="side-nav">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">&times;</a>
        <a href="#" onclick="showSection('main')">🏠 Home</a>
        <a href="#" onclick="showSection('how-it-works')">❓ How It Works</a>
        <a href="#" onclick="showSection('about')">ℹ️ About Us</a>
    </nav>

    <div class="container" id="mainApp">
        <header class="logo-header">
            <img src="finallogo.jpg" alt="Logo" class="main-logo">
        </header>
        
        <div class="video-container">
            <video id="video" autoplay playsinline style="display:none;"></video>
            <canvas id="output"></canvas>
        </div>
        
        <div class="pulse-display">
            <div id="skinToneLabel" class="label-small">Detecting Skin...</div>
            <div class="pulse-value" id="pulseValue">--</div>
            <div class="pulse-unit">BPM</div>
            <div id="emotionLabel" class="emotion-text">Emotion: Neutral</div>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Status</span>
                <span id="status" class="stat-value">Connecting...</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Signal</span>
                <span id="signalQuality" class="stat-value">--</span>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="pulseChart"></canvas>
        </div>
        
        <div class="controls">
            <button id="startBtn" disabled>▶ Start Detection</button>
            <button id="stopBtn">⏹ Stop</button>
        </div>
    </div>

    <!-- Info Sections -->
    <div id="infoSection" class="overlay-section" style="display:none;">
        <button class="back-btn" onclick="showSection('main')">← Back</button>
        <h2 id="infoTitle"></h2>
        <div id="infoContent"></div>
    </div>

    <!-- IMPORTANT: Load scripts in this exact order[cite: 1, 3] -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
    <script src="script.js"></script>
</body>
</html>
